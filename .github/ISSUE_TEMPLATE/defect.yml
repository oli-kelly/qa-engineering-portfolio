name: Defect report
description: Capture a reproducible product problem with impact and evidence.
title: "[Defect]: "
labels: [bug, needs-triage]
body:
  - type: textarea
    id: impact
    attributes:
      label: User and business impact
      description: Who is affected, how badly, and why the problem matters.
    validations:
      required: true
  - type: dropdown
    id: severity
    attributes:
      label: Suggested severity
      options:
        - S1 - Critical harm or irreversible business action
        - S2 - Major journey blocked or material incorrect result
        - S3 - Degraded journey with workaround
        - S4 - Minor or cosmetic impact
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment and build
      placeholder: Build/commit, URL/environment, browser/device, account/data conditions
    validations:
      required: true
  - type: textarea
    id: preconditions
    attributes:
      label: Preconditions and test data
  - type: textarea
    id: steps
    attributes:
      label: Minimal steps to reproduce
      placeholder: "1. ...\n2. ...\n3. ..."
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual result
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected result and source
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Evidence and reproducibility
      description: Frequency, timestamps, request/correlation IDs, logs, screenshots or recordings. Redact sensitive data.
  - type: textarea
    id: notes
    attributes:
      label: Investigation notes and retest risks
      description: Keep hypotheses separate from confirmed root cause.
